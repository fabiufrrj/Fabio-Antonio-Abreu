<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horário de Aulas - Economia 2026.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tab-btn.active {
            border-color: #2563eb;
            color: #2563eb;
            background-color: #eff6ff;
        }
        /* Garantir que a imagem apareça bem em dispositivos móveis */
        .logo-container img {
            max-height: 120px;
            width: auto;
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 flex flex-col min-h-screen">

    <div class="container mx-auto p-4 sm:p-6 max-w-4xl flex-grow">
        <div class="bg-white rounded-2xl shadow-xl p-4 sm:p-8">
            <header class="text-center mb-8">
                <!-- LOGOTIPO VIA GOOGLE DRIVE -->
                <div class="logo-container flex justify-center items-center mb-4">
                    <!-- Tentei usar o formato de thumbnail do Google Drive que é mais estável para exibição -->
                    <img src="https://drive.google.com/thumbnail?id=17EWaESbxJ4cieNCigMB5y0ZisUpfXtIP&sz=w1000" 
                         alt="Logotipo Economia"
                         onerror="this.onerror=null; this.src='https://placehold.co/400x150?text=Erro+no+Link+do+Drive+-+Verifique+Permissões';">
                </div>
                
                <h1 class="text-2xl sm:text-3xl font-bold text-gray-900">Consulta de Horários 2026.1</h1>
                <p class="text-gray-500 mt-1 text-sm sm:text-base">Graduação em Ciências Econômicas</p>
            </header>

            <!-- Abas de Navegação -->
            <div class="mb-6 flex border-b border-gray-200">
                <button id="tab-turma" class="tab-btn active flex-1 font-semibold px-4 py-3 text-sm transition-all border-b-2">Por Turma</button>
                <button id="tab-professor" class="tab-btn flex-1 font-semibold px-4 py-3 text-sm text-gray-500 hover:text-gray-700 transition-all border-b-2 border-transparent">Por Professor</button>
            </div>

            <!-- Painéis de Busca -->
            <div class="space-y-6">
                <!-- Painel Turma -->
                <div id="panel-turma" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Dia da Semana</label>
                        <select id="dia-semana" class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="segunda">Segunda-feira</option>
                            <option value="terca">Terça-feira</option>
                            <option value="quarta">Quarta-feira</option>
                            <option value="quinta">Quinta-feira</option>
                            <option value="sexta">Sexta-feira</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Período</label>
                        <select id="periodo" class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="1">1º Período</option>
                            <option value="2">2º Período</option>
                            <option value="3">3º Período</option>
                            <option value="4">4º Período</option>
                            <option value="5">5º Período</option>
                            <option value="6">6º Período</option>
                            <option value="7">7º Período</option>
                            <option value="8">8º Período</option>
                            <option value="9">9º Período</option>
                        </select>
                    </div>
                </div>

                <!-- Painel Professor -->
                <div id="panel-professor" class="hidden">
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Escolha o Professor</label>
                    <select id="select-professor" class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    </select>
                </div>
                
                <button id="buscar-btn" class="w-full bg-blue-600 text-white font-bold px-6 py-4 rounded-xl hover:bg-blue-700 active:transform active:scale-95 transition-all shadow-lg">
                    BUSCAR HORÁRIO
                </button>
            </div>

            <!-- Área de Resultados -->
            <div id="resultado" class="mt-8 min-h-[100px]">
                <div class="text-center text-gray-400 py-10 border-2 border-dashed border-gray-100 rounded-2xl">
                    <p>Selecione os filtros acima para visualizar as aulas.</p>
                </div>
            </div>

            <!-- Link Documento Completo -->
            <div class="mt-10 pt-8 border-t border-gray-100 text-center">
                <p class="text-sm text-gray-500 mb-4 font-medium">Link para consulta do horário completo:</p>
                <a href="https://docs.google.com/document/d/15p4vadvF__tu0m9XhfaLkt4QMKVN-2kufQfvjDimpZk/edit?usp=sharing" target="_blank" class="inline-flex items-center gap-2 bg-green-50 text-green-700 font-bold px-6 py-3 rounded-full hover:bg-green-100 transition-colors">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                    ABRIR DOCUMENTO
                </a>
            </div>
        </div>
    </div>
    
    <footer class="text-center py-6">
        <p class="text-[10px] sm:text-xs text-gray-400 uppercase tracking-widest">
            Desenvolvido por Fabio Antonio Abreu com o uso do GEMINI
        </p>
    </footer>

            // TERÇA-FEIRA
            { periodo: 1, dia: "terca", horario: "18-20", disciplina: "IM307 - CONTABILIDADE GERAL", professor: "ELIANE CORTES BRAGA", sala: "203.M" },
            { periodo: 1, dia: "terca", horario: "20-22", disciplina: "IM453 - MATEMÁTICA PARA ECONOMIA", professor: "A DEFINIR", sala: "203.M" },
            { periodo: 2, dia: "terca", horario: "18-20", disciplina: "IM420 - MATEMÁTICA PARA ECONOMIA 2", professor: "A DEFINIR", sala: "309.M" },
            { periodo: 2, dia: "terca", horario: "20-22", disciplina: "TM911 - ECONOMIA POLÍTICA 1", professor: "CLARICE MENEZES VIEIRA", sala: "309.M" },

            { periodo: 4, dia: "terca", horario: "18-22", disciplina: "TM916 - HISTÓRIA DO PENSAMENTO ECONÔMICO", professor: "MARIO MOTTA DE ALMEIDA MAXIMO", sala: "302.B" },
            { periodo: 5, dia: "terca", horario: "18-22", disciplina: "IM424 - ESTATISTICA II", professor: "ROSEMBERG CARLOS", sala: "303.B" },
            { periodo: 6, dia: "terca", horario: "18-22", disciplina: "TM915 - ECONOMIA DO SETOR PUBLICO", professor: "ELISA ALONSO MONCORES VIANA", sala: "302.A" },
            { periodo: 7, dia: "terca", horario: "18-22", disciplina: "IM269 - ECONOMIA FLUMINENSE", professor: "ISRAEL SANCHES MARCELLINO", sala: "203.B" },
            { periodo: 8, dia: "terca", horario: "18-22", disciplina: "IM269 - ECONOMIA FLUMINENSE", professor: "ISRAEL SANCHES MARCELLINO", sala: "203.B" },

            // QUARTA-FEIRA
            { periodo: 1, dia: "quarta", horario: "18-20", disciplina: "IM307 - CONTABILIDADE GERAL", professor: "ELIANE CORTES BRAGA", sala: "203.M" },
            { periodo: 1, dia: "quarta", horario: "20-22", disciplina: "IM453 - MATEMÁTICA PARA ECONOMIA", professor: "A DEFINIR", sala: "203.M" },
            { periodo: 2, dia: "quarta", horario: "18-20", disciplina: "IM420 - MATEMÁTICA PARA ECONOMIA 2", professor: "A DEFINIR", sala: "309.M" },
            { periodo: 2, dia: "quarta", horario: "20-22", disciplina: "TM911 - ECONOMIA POLÍTICA 1", professor: "CLARICE MENEZES VIEIRA", sala: "309.M" },
            { periodo: 3, dia: "quarta", horario: "18-22", disciplina: "TM903 - MACROECONOMIA 2", professor: "ELENA SOIHET", sala: "202.A" },
            { periodo: 4, dia: "quarta", horario: "18-22", disciplina: "TM904 - MACROECONOMIA 3", professor: "LUCAS ANTUNES POVOA", sala: "302.B" },
            { periodo: 5, dia: "quarta", horario: "18-22", disciplina: "TM905 - MACROECONOMIA 4", professor: "DANIEL SENNA DIAS", sala: "303.B" },
            { periodo: 6, dia: "quarta", horario: "18-22", disciplina: "TM922 - TÉCNICAS DE PESQUISA E METODOLOGIA ECONÔMICA", professor: "BETTY NOGUEIRA ROCHA", sala: "302.A" },
            { periodo: 7, dia: "quarta", horario: "18-22", disciplina: "IM626 - PADRÕES DE DESENVOLVIMENTO ECONÔMICO", professor: "DANIELE DA ROCHA FARIA", sala: "203.B" },

            { periodo: 7, dia: "quarta", horario: "18-20", disciplina: "IM147 - FILOSOFIA E ETICA NAS ORGANIZAÇÕES", professor: "LEANDRO PINHEIRO CHEVITARESE", sala: "202.B" },
            { periodo: 9, dia: "quarta", horario: "18-20", disciplina: "IM147 - FILOSOFIA E ETICA NAS ORGANIZAÇÕES", professor: "LEANDRO PINHEIRO CHEVITARESE", sala: "202.B" },
            { periodo: 7, dia: "quarta", horario: "20-22", disciplina: "IM309 - DIREITO", professor: "TALITA", sala: "202.B" },
            { periodo: 9, dia: "quarta", horario: "20-22", disciplina: "IM309 - DIREITO", professor: "TALITA", sala: "202.B" },

            // QUINTA-FEIRA
            { periodo: 1, dia: "quinta", horario: "18-22", disciplina: "IM226 - INTRODUÇÃO A SOCIOLOGIA", professor: "SILVIA REGINA ALVES FERNANDES", sala: "203.M" },
            { periodo: 2, dia: "quinta", horario: "18-22", disciplina: "TM906 - MICROECONOMIA 1", professor: "EDUARDO MARTINS MORAIS", sala: "309.M" },
            { periodo: 3, dia: "quinta", horario: "18-22", disciplina: "TM907 - MICROECONOMIA 2", professor: "JULIO CEZAR RUSSO PINTO DA SILVA", sala: "202.A" },
            { periodo: 4, dia: "quinta", horario: "18-22", disciplina: "TM908 - MICROECONOMIA 3", professor: "ISRAEL SANCHES MARCELLINO", sala: "302.B" },
            { periodo: 5, dia: "quinta", horario: "18-22", disciplina: "TM910 - ECONOMIA INDUSTRIAL", professor: "GEORGES GERARD FLEXOR", sala: "303.B" },
            { periodo: 6, dia: "quinta", horario: "18-22", disciplina: "TM921 - DESENVOLVIMENTO SÓCIO-ECONÔMICO", professor: "ROBSON DIAS DA SILVA", sala: "302.A" },
            { periodo: 7, dia: "quinta", horario: "18-22", disciplina: "IM658 - MODELOS MACROECONÔMICOS ESTRUTURALISTAS E KALECKIANOS", professor: "LEANDRO DA SILVA FAGUNDES", sala: "203.B" },
            { periodo: 8, dia: "quinta", horario: "18-22", disciplina: "IM658 - MODELOS MACROECONÔMICOS ESTRUTURALISTAS E KALECKIANOS", professor: "LEANDRO DA SILVA FAGUNDES", sala: "203.B" },

            // SEXTA-FEIRA
            { periodo: 1, dia: "sexta", horario: "18-22", disciplina: "IM301 - INTRODUÇÃO À ADMINISTRAÇÃO", professor: "CARLOS HENRIQUE BERRINI", sala: "203.M" },
            { periodo: 2, dia: "sexta", horario: "18-22", disciplina: "TM902 - MACROECONOMIA 1", professor: "DANIELE DA ROCHA FARIA", sala: "309.M" },
            { periodo: 3, dia: "sexta", horario: "18-22", disciplina: "IM421 - MATEMÁTICA PARA ECONOMIA 3", professor: "A DEFINIR", sala: "202.A" },
            { periodo: 4, dia: "sexta", horario: "18-22", disciplina: "TM919 - ECONOMIA BRASILEIRA 1", professor: "ADRIANNO OLIVEIRA RODRIGUES", sala: "302.B" },
            { periodo: 5, dia: "sexta", horario: "18-22", disciplina: "TM914 - ECONOMIA MONETÁRIA", professor: "LUCAS ANTUNES POVOA", sala: "303.B" },
            { periodo: 6, dia: "sexta", horario: "18-22", disciplina: "TM909 - ECONOMETRIA 1", professor: "JULIO CEZAR RUSSO PINTO DA SILVA", sala: "302.A" }
        ];

        const tabTurma = document.getElementById('tab-turma');
        const tabProfessor = document.getElementById('tab-professor');
        const panelTurma = document.getElementById('panel-turma');
        const panelProfessor = document.getElementById('panel-professor');
        const diaSelect = document.getElementById('dia-semana');
        const periodoSelect = document.getElementById('periodo');
        const professorSelect = document.getElementById('select-professor');
        const buscarBtn = document.getElementById('buscar-btn');
        const resultadoDiv = document.getElementById('resultado');

        let activeTab = 'turma';

        tabTurma.onclick = () => { 
            activeTab = 'turma'; 
            tabTurma.className = 'tab-btn active flex-1 font-semibold px-4 py-3 text-sm transition-all border-b-2'; 
            tabProfessor.className = 'tab-btn flex-1 font-semibold px-4 py-3 text-sm text-gray-500 hover:text-gray-700 transition-all border-b-2 border-transparent'; 
            panelTurma.classList.remove('hidden'); 
            panelProfessor.classList.add('hidden'); 
        };

        tabProfessor.onclick = () => { 
            activeTab = 'professor'; 
            tabProfessor.className = 'tab-btn active flex-1 font-semibold px-4 py-3 text-sm transition-all border-b-2'; 
            tabTurma.className = 'tab-btn flex-1 font-semibold px-4 py-3 text-sm text-gray-500 hover:text-gray-700 transition-all border-b-2 border-transparent'; 
            panelProfessor.classList.remove('hidden'); 
            panelTurma.classList.add('hidden'); 
        };

        function cap(s) { return s.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' '); }

        function render(items, title) {
            if (!items.length) {
                resultadoDiv.innerHTML = `<div class="p-6 bg-yellow-50 text-yellow-700 rounded-2xl border-l-4 border-yellow-400 text-sm">Nenhuma aula encontrada para estes filtros.</div>`;
                return;
            }
            let html = `<div class="mb-4"><h3 class="text-lg font-bold text-gray-700">${title}</h3></div><div class="space-y-3">`;
            items.forEach(a => {
                html += `
                <div class="bg-white border border-gray-200 p-4 rounded-2xl shadow-sm">
                    <div class="flex flex-col gap-3">
                        <div>
                            <p class="text-blue-700 font-bold leading-tight">${a.disciplina}</p>
                            <p class="text-xs text-gray-400 mt-1 uppercase font-bold tracking-tighter">${activeTab === 'professor' ? `${cap(a.dia)}-feira | ${a.periodo}º Período` : cap(a.professor)}</p>
                        </div>
                        <div class="flex justify-between items-center border-t border-gray-50 pt-3">
                            <div class="flex items-center gap-2">
                                <span class="bg-gray-100 text-gray-600 text-[10px] font-bold px-2 py-1 rounded uppercase">SALA ${a.sala}</span>
                            </div>
                            <div class="text-right">
                                <p class="text-sm font-black text-gray-900">${a.horario}H</p>
                            </div>
                        </div>
                    </div>
                </div>`;
            });
            resultadoDiv.innerHTML = html + `</div>`;
        }

        buscarBtn.onclick = () => {
            if (activeTab === 'turma') {
                const d = diaSelect.value;
                const p = parseInt(periodoSelect.value);
                const items = cronograma.filter(a => a.dia === d && a.periodo === p);
                render(items, `${cap(d)}-feira | ${p}º Período`);
            } else {
                const prof = professorSelect.value;
                const items = cronograma.filter(a => a.professor === prof);
                render(items, `Agenda: ${cap(prof)}`);
            }
        };

        window.onload = () => {
            const profs = [...new Set(cronograma.map(a => a.professor))].sort();
            profs.forEach(p => {
                if (p !== "A DEFINIR") {
                    const opt = document.createElement('option');
                    opt.value = p; opt.textContent = cap(p);
                    professorSelect.appendChild(opt);
                }
            });
        };
    </script>
</body>
</html>
